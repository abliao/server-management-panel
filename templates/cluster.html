<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集群管理 - 训练与测试调度</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            z-index: 100;
        }
        .nav a {
            color: #58a6ff;
            text-decoration: none;
            font-weight: 500;
        }
        .nav a:hover { color: #79c0ff; }
        .nav .active { color: #7ee787; }
        .main {
            margin-top: 60px;
            padding: 24px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }
        .section {
            background: #161b22;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #30363d;
        }
        .section h2 {
            color: #7ee787;
            font-size: 1.2rem;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #30363d;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 12px;
        }
        .form-group { flex: 1; min-width: 180px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 0.85rem; color: #8b949e; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-family: inherit;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .btn-primary { background: #238636; color: #fff; }
        .btn-primary:hover { background: #2ea043; }
        .btn-danger { background: #da3633; color: #fff; }
        .btn-danger:hover { background: #f85149; }
        .btn-secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
        .btn-secondary:hover { background: #30363d; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #30363d; }
        th { color: #8b949e; font-weight: 500; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
        }
        .badge-pending { background: #387604; color: #7ee787; }
        .badge-running { background: #1f6feb; color: #fff; }
        .badge-done { background: #238636; color: #7ee787; }
        .badge-failed { background: #da3633; color: #ff7b72; }
        .badge-killed { background: #6e7681; color: #8b949e; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #161b22;
            border-radius: 12px;
            padding: 24px;
            max-width: 800px;
            width: 100%;
            max-height: 85vh;
            overflow: auto;
            border: 1px solid #30363d;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-header h3 { color: #7ee787; }
        .modal-close { background: none; border: none; color: #8b949e; font-size: 1.5rem; cursor: pointer; }
        .log-viewer {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            max-height: 400px;
            overflow: auto;
            white-space: pre-wrap;
        }

        /* 空闲 GPU 概览 */
        .idle-gpu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        .idle-gpu-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 16px;
            transition: border-color 0.2s;
        }
        .idle-gpu-card:hover { border-color: #484f58; }
        .idle-gpu-card.error { border-color: #da3633; background: #da363311; }
        .idle-gpu-card .server-name {
            font-weight: 600;
            font-size: 1rem;
            color: #e6edf3;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .idle-gpu-card .server-name i { color: #7ee787; font-size: 0.9rem; }
        .idle-gpu-card .gpu-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            font-size: 0.9rem;
        }
        .idle-gpu-card .gpu-row + .gpu-row { border-top: 1px solid #21262d; }
        .idle-gpu-card .gpu-label {
            color: #8b949e;
            min-width: 56px;
            font-size: 0.8rem;
        }
        .idle-gpu-card .gpu-value {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .idle-gpu-card .gpu-chip {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
        }
        .idle-gpu-card .gpu-chip.has-idle { background: #23863633; color: #7ee787; }
        .idle-gpu-card .gpu-chip.empty { background: #21262d; color: #6e7681; }
        .idle-gpu-card .gpu-total {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #30363d;
            font-size: 0.85rem;
            color: #8b949e;
        }
        .idle-gpu-card .gpu-total strong { color: #58a6ff; font-weight: 500; }
        .idle-gpu-card .gpu-total.error { color: #f85149; }

        /* 折叠开关 */
        .section-toggle {
            margin-left: 10px;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 999px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #8b949e;
            cursor: pointer;
        }
        .section-toggle:hover {
            background: #21262d;
            color: #c9d1d9;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/"><i class="fas fa-chart-bar"></i> 监控面板</a>
        <a href="/admin"><i class="fas fa-cogs"></i> 管理面板</a>
        <a href="/cluster" class="active"><i class="fas fa-layer-group"></i> 集群管理</a>
        <a href="#" onclick="event.preventDefault();fetch('/api/admin/logout',{method:'POST'}).then(()=>location.href='/admin/login');" style="margin-left:auto;"><i class="fas fa-sign-out-alt"></i> 退出</a>
    </nav>

    <main class="main">
        <div id="msg" class="section" style="display:none; margin-bottom:12px;"></div>

        <!-- 全局配置 -->
        <div class="section">
            <h2><i class="fas fa-sliders-h"></i> 集群配置</h2>
            <p style="color:#8b949e;font-size:0.85rem;margin-bottom:12px;">各服务器的代码路径、数据路径请在【管理面板 → 服务器编辑】中单独配置</p>
            <div class="form-row">
                <div class="form-group" style="flex:0 0 100%;"><strong style="color:#7ee787;">训练用</strong>（显存/算力要求高，阈值更严格）</div>
                <div class="form-group">
                    <label>训练-显存阈值(%)</label>
                    <input type="number" id="cfg-train-mem" value="20" min="0" max="100">
                </div>
                <div class="form-group">
                    <label>训练-算力阈值(%)</label>
                    <input type="number" id="cfg-train-util" value="15" min="0" max="100">
                </div>
                <div class="form-group" style="flex:0 0 100%; margin-top:12px;"><strong style="color:#7ee787;">部署用</strong>（要求较低，可用更繁忙的卡）</div>
                <div class="form-group">
                    <label>部署-显存阈值(%)</label>
                    <input type="number" id="cfg-test-mem" value="20" min="0" max="100">
                </div>
                <div class="form-group">
                    <label>部署-算力阈值(%)</label>
                    <input type="number" id="cfg-test-util" value="15" min="0" max="100">
                </div>
                <div class="form-group">
                    <label>每机保留卡数</label>
                    <input type="number" id="cfg-reserved" value="0" min="0">
                </div>
                <div class="form-group" style="display:flex;align-items:flex-end;">
                    <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
                </div>
            </div>
        </div>

        <!-- 空闲GPU概览 -->
        <div class="section">
            <h2><i class="fas fa-microchip"></i> 空闲 GPU 概览</h2>
            <div id="idle-gpus"></div>
        </div>

        <!-- 训练任务 -->
        <div class="section">
            <h2>
                <i class="fas fa-brain"></i> 训练任务
                <button type="button" class="section-toggle" onclick="toggleSection('train')">折叠/展开</button>
                <button type="button" class="section-toggle" onclick="fillLastTrainForm()">填入上次</button>
            </h2>
            <div id="train-section-body">
            <div class="form-row">
                <div class="form-group">
                    <label>任务名</label>
                    <input type="text" id="train-name" placeholder="exp_001">
                </div>
                <div class="form-group">
                    <label>脚本路径(相对代码目录)</label>
                    <input type="text" id="train-script" placeholder="train.sh">
                </div>
                <div class="form-group">
                    <label>脚本参数</label>
                    <input type="text" id="train-args" placeholder="--epochs 10">
                </div>
                <div class="form-group">
                    <label>GPU 数量</label>
                    <input type="number" id="train-gpu-count" value="1" min="1" max="8">
                </div>
                <div class="form-group">
                    <label>优先级(1-10)</label>
                    <input type="number" id="train-priority" value="5" min="1" max="10">
                </div>
                <div class="form-group" style="display:flex;align-items:flex-end;">
                    <button class="btn btn-primary" onclick="submitTraining()">提交训练</button>
                </div>
            </div>
            <div class="form-row" style="align-items:flex-start;">
                <div class="form-group" style="flex:0 0 100%;">
                    <label>可选服务器 <span style="color:#8b949e;font-weight:400;font-size:0.85em;">（不选=全部可用）</span></label>
                    <div id="train-server-choices" class="server-checkboxes" style="display:flex;flex-wrap:wrap;gap:12px 20px;margin-top:6px;padding:10px;background:#0d1117;border-radius:6px;border:1px solid #30363d;">
                        <span style="color:#6e7681;font-size:0.9em;">加载中...</span>
                    </div>
                    <div style="margin-top:6px;">
                        <button type="button" class="btn btn-secondary" style="padding:4px 10px;font-size:0.8rem;" onclick="trainServerSelectAll()">全选</button>
                        <button type="button" class="btn btn-secondary" style="padding:4px 10px;font-size:0.8rem;margin-left:8px;" onclick="trainServerSelectNone()">清空</button>
                    </div>
                </div>
            </div>
            <div class="table-wrap" style="margin-top:16px;">
                <table>
                    <thead>
                        <tr><th>ID</th><th>任务名</th><th>脚本</th><th>服务器</th><th>GPU</th><th>权重</th><th>状态</th><th>操作</th></tr>
                    </thead>
                    <tbody id="train-list"></tbody>
                </table>
            </div>
            </div>
        </div>

        <!-- 部署任务 -->
        <div class="section">
            <h2>
                <i class="fas fa-rocket"></i> 部署任务
                <button type="button" class="section-toggle" onclick="toggleSection('deploy')">折叠/展开</button>
                <button type="button" class="section-toggle" onclick="fillLastDeployForm()">填入上次</button>
            </h2>
            <div id="deploy-section-body">
            <div class="form-row">
                <div class="form-group">
                    <label>任务名</label>
                    <input type="text" id="deploy-name" placeholder="deploy_search_green_boxes">
                </div>
                <div class="form-group">
                    <label>脚本路径(相对代码目录)</label>
                    <input type="text" id="deploy-script" placeholder="deploy.sh 或 deploy.py">
                </div>
                <div class="form-group">
                    <label>模型权重(可选)</label>
                    <input type="text" id="deploy-weight" placeholder="checkpoints/xxx.pt">
                </div>
                <div class="form-group">
                    <label>优先级(1-10)</label>
                    <input type="number" id="deploy-priority" value="5" min="1" max="10">
                </div>
                <div class="form-group">
                    <label>端口(可选)</label>
                    <input type="number" id="deploy-port" value="" min="1" max="65535" placeholder="如 18080">
                </div>
                <div class="form-group" style="display:flex;align-items:flex-end;">
                    <button class="btn btn-primary" onclick="submitDeploy()">提交部署</button>
                </div>
            </div>
            <div class="form-row" style="align-items:flex-start;">
                <div class="form-group" style="flex:0 0 100%;">
                    <label>可选服务器 <span style="color:#8b949e;font-weight:400;font-size:0.85em;">（不选=全部可用）</span></label>
                    <div id="deploy-server-choices" class="server-checkboxes" style="display:flex;flex-wrap:wrap;gap:12px 20px;margin-top:6px;padding:10px;background:#0d1117;border-radius:6px;border:1px solid #30363d;">
                        <span style="color:#6e7681;font-size:0.9em;">加载中...</span>
                    </div>
                    <div style="margin-top:6px;">
                        <button type="button" class="btn btn-secondary" style="padding:4px 10px;font-size:0.8rem;" onclick="deployServerSelectAll()">全选</button>
                        <button type="button" class="btn btn-secondary" style="padding:4px 10px;font-size:0.8rem;margin-left:8px;" onclick="deployServerSelectNone()">清空</button>
                    </div>
                </div>
            </div>
            <div class="table-wrap" style="margin-top:16px;">
                <table>
                    <thead>
                        <tr><th>ID</th><th>任务名</th><th>脚本</th><th>权重</th><th>服务器</th><th>GPU</th><th>端口</th><th>状态</th><th>操作</th></tr>
                    </thead>
                    <tbody id="deploy-list"></tbody>
                </table>
            </div>
            </div>
        </div>

        <!-- 测试任务 -->
        <div class="section">
            <h2>
                <i class="fas fa-vial"></i> 测试任务
                <button type="button" class="section-toggle" onclick="toggleSection('test')">折叠/展开</button>
                <button type="button" class="section-toggle" onclick="fillLastTestForm()">填入上次</button>
            </h2>
            <div id="test-section-body">
            <div class="form-row">
                <div class="form-group">
                    <label>任务名</label>
                    <input type="text" id="test-name" placeholder="test_mock_001">
                </div>
                <div class="form-group">
                    <label>类型</label>
                    <select id="test-type" onchange="onTestTypeChange()"><option value="mock">Mock</option><option value="real">真机</option></select>
                </div>
                <div class="form-group">
                    <label>测试服务器</label>
                    <select id="test-server"><option value="">请选择服务器</option></select>
                </div>
                <div class="form-group">
                    <label>关联部署任务ID(可选)</label>
                    <select id="test-deploy-id" onchange="onTestDeployChange()">
                        <option value="">不关联</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>测试代码路径(相对代码目录)</label>
                    <input type="text" id="test-code-path" placeholder="tests/eval">
                </div>
                <div class="form-group">
                    <label>脚本路径</label>
                    <input type="text" id="test-script" placeholder="eval.py">
                </div>
                <div class="form-group">
                    <label>脚本参数</label>
                    <input type="text" id="test-args" placeholder="">
                </div>
                <div class="form-group test-mock-field">
                    <label>URL</label>
                    <input type="text" id="test-mock-url" placeholder="http://127.0.0.1:8000/mock">
                </div>
                <div class="form-group test-mock-field">
                    <label>task_name</label>
                    <input type="text" id="test-mock-task-name" placeholder="search_green_boxes">
                </div>
                <div class="form-group test-real-field" style="display:none;">
                    <label>Real user_token</label>
                    <input type="text" id="test-user-token" placeholder="token_xxx">
                </div>
                <div class="form-group test-real-field" style="display:none;">
                    <label>Real run_id</label>
                    <input type="text" id="test-run-id" placeholder="run_001">
                </div>
                <div class="form-group" style="display:flex;align-items:flex-end;">
                    <button class="btn btn-primary" onclick="submitTest()">提交测试</button>
                </div>
            </div>
            <div class="table-wrap" style="margin-top:16px;">
                <table>
                    <thead>
                        <tr><th>ID</th><th>任务名</th><th>类型</th><th>关联部署ID</th><th>服务器</th><th>端口</th><th>状态</th><th>操作</th></tr>
                    </thead>
                    <tbody id="test-list"></tbody>
                </table>
            </div>
            </div>
        </div>

        <!-- 模型权重 -->
        <div class="section">
            <h2><i class="fas fa-database"></i> 模型权重</h2>
            <div class="form-row" style="margin-bottom:16px;">
                <div class="form-group"><label>源服务器</label><input type="text" id="xfer-src" placeholder="server1"></div>
                <div class="form-group"><label>目标服务器</label><input type="text" id="xfer-dst" placeholder="server2"></div>
                <div class="form-group"><label>权重路径</label><input type="text" id="xfer-path" placeholder="/path/to/weights"></div>
                <div class="form-group" style="display:flex;align-items:flex-end;"><button class="btn btn-primary" onclick="transferWeight()">远程传输</button></div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>名称</th><th>路径</th><th>服务器</th><th>训练ID</th></tr>
                    </thead>
                    <tbody id="weight-list"></tbody>
                </table>
            </div>
        </div>

        <!-- 内存报警 -->
        <div class="section">
            <h2>
                <i class="fas fa-exclamation-triangle"></i> 报警记录
                <button type="button" class="section-toggle" onclick="toggleSection('alert')">折叠/展开</button>
            </h2>
            <div id="alert-section-body">
                <div id="alert-list"></div>
            </div>
        </div>
    </main>

    <!-- 日志弹窗 -->
    <div id="log-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="log-modal-title">训练日志</h3>
                <button class="modal-close" onclick="closeLogModal()">&times;</button>
            </div>
            <div id="log-content" class="log-viewer">加载中...</div>
        </div>
    </div>

    <script>
        const TRAIN_FORM_KEY = 'cluster_last_train_form';
        const DEPLOY_FORM_KEY = 'cluster_last_deploy_form';
        const TEST_FORM_KEY = 'cluster_last_test_form';
        let deployTaskCache = [];

        function showMsg(type, text) {
            const el = document.getElementById('msg');
            el.style.display = 'block';
            el.className = 'section ' + (type === 'ok' ? '' : '');
            el.style.background = type === 'ok' ? '#23863622' : '#da363322';
            el.style.borderColor = type === 'ok' ? '#238636' : '#da3633';
            el.textContent = text;
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        async function api(path, opts = {}) {
            const r = await fetch(path, opts);
            return r.json();
        }

        const sectionCollapsed = {
            train: true,
            deploy: true,
            test: true,
            alert: true,
        };

        function saveLastTrainForm(payload, allowedServers) {
            try {
                const data = {
                    name: payload.name || '',
                    script_path: payload.script_path || '',
                    script_args: payload.script_args || '',
                    priority: payload.priority || 5,
                    gpu_count: payload.gpu_count || 1,
                    allowed_servers: allowedServers || []
                };
                localStorage.setItem(TRAIN_FORM_KEY, JSON.stringify(data));
            } catch (e) {}
        }

        function fillLastTrainForm() {
            try {
                const raw = localStorage.getItem(TRAIN_FORM_KEY);
                if (!raw) { showMsg('err', '暂无上次训练参数'); return; }
                const d = JSON.parse(raw);
                document.getElementById('train-name').value = d.name || '';
                document.getElementById('train-script').value = d.script_path || '';
                document.getElementById('train-args').value = d.script_args || '';
                document.getElementById('train-priority').value = d.priority || 5;
                document.getElementById('train-gpu-count').value = d.gpu_count || 1;
                if (Array.isArray(d.allowed_servers) && d.allowed_servers.length > 0) {
                    document.querySelectorAll('.train-server-cb').forEach(cb => {
                        cb.checked = d.allowed_servers.includes(cb.value);
                    });
                }
                showMsg('ok', '已填入上次训练参数');
            } catch (e) {
                showMsg('err', '读取上次训练参数失败');
            }
        }

        function saveLastTestForm(payload) {
            try {
                const data = {
                    name: payload.name || '',
                    task_type: payload.task_type || 'mock',
                    server_name: payload.server_name || '',
                    deploy_task_id: payload.deploy_task_id || '',

        function prettyPathName(path) {
            if (!path) return '-';
            const p = String(path);
            const name = p.split('/').pop() || p;
            return name.length > 28 ? name.slice(0, 28) + '...' : name;
        }

        function renderPathCell(path, label) {
            if (!path) return '-';
            const encoded = encodeURIComponent(path);
            const shortName = prettyPathName(path).replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return `<button class="btn btn-secondary" style="padding:4px 8px;font-size:0.8rem;margin-right:6px;" onclick="showPathDetail('${label}','${encoded}')">查看</button><code>${shortName}</code>`;

                        ${(t.status === 'done' || t.status === 'running') ? `<button class="btn btn-secondary" style="padding:4px 8px;font-size:0.8rem;" onclick="recordWeight(${t.id},'${(t.name||'').replace(/'/g,"\\'")}', '${encodeURIComponent(t.weight_path || '')}')">${t.weight_path ? '修改权重' : '记录权重'}</button>` : ''}

        async function submitDeploy() {
            const name = document.getElementById('deploy-name').value.trim();
            const script = document.getElementById('deploy-script').value.trim();
            const weight = document.getElementById('deploy-weight').value.trim();
            const priority = parseInt(document.getElementById('deploy-priority').value || '5', 10);
            const portRaw = document.getElementById('deploy-port').value.trim();
            const port = portRaw ? parseInt(portRaw, 10) : null;
            const allowedServers = getDeploySelectedServers();
            if (!name || !script) { showMsg('err', '任务名和脚本路径必填'); return; }
            if (portRaw && (isNaN(port) || port < 1 || port > 65535)) { showMsg('err', '端口范围应为 1-65535'); return; }
            const payload = {
                name,
                script_path: script,
                weight_path: weight,
                priority: isNaN(priority) ? 5 : priority,
                port: port
            };
            if (allowedServers.length > 0) payload.allowed_servers = allowedServers;
            saveLastDeployForm(payload, allowedServers);
            const d = await api('/api/cluster/deploy/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (d.success) { showMsg('ok', '部署任务已提交'); loadDeploy(); }
            else showMsg('err', d.error);
        }

        async function submitTraining() {
            const name = document.getElementById('train-name').value.trim();
            const script = document.getElementById('train-script').value.trim();
            const args = document.getElementById('train-args').value.trim();
            const priority = document.getElementById('train-priority').value;
            const gpuCount = parseInt(document.getElementById('train-gpu-count').value || '1', 10);
            const allowedServers = getTrainSelectedServers();
            if (!name || !script) { showMsg('err', '任务名和脚本路径必填'); return; }
            const payload = {
                name,
                script_path: script,
                script_args: args,
                priority: parseInt(priority),
                gpu_count: isNaN(gpuCount) || gpuCount < 1 ? 1 : gpuCount
            };
            if (allowedServers.length > 0) payload.allowed_servers = allowedServers;
            // 本地记录上一次训练参数，方便复用
            saveLastTrainForm(payload, allowedServers);
            const d = await api('/api/cluster/training/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (d.success) { showMsg('ok', '训练任务已提交，等待调度'); loadTraining(); }
            else showMsg('err', d.error);
        }

        async function recordDeployPort(id, currentPort) {
            const defaultPort = (currentPort || '').toString();
            const p = prompt('请输入部署端口（1-65535）：', defaultPort || '18080');
            if (!p) return;
            const port = parseInt(p.trim(), 10);
            if (isNaN(port) || port < 1 || port > 65535) {
                showMsg('err', '端口范围应为 1-65535');
                return;
            }
            const d = await api('/api/cluster/deploy/' + id + '/port', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ port })
            });
            if (d.success) { showMsg('ok', currentPort ? '端口已修改' : '端口已记录'); loadDeploy(); }
            else showMsg('err', d.error);
        }

        async function recordWeight(id, name, encodedCurrentPath) {
            const currentPath = decodeURIComponent(encodedCurrentPath || '');
            const defaultPath = currentPath || '/path/to/checkpoint/best.pt';
            const path = prompt('请输入权重保存路径（在对应服务器上的绝对路径）：', defaultPath);
            if (!path) return;
            const d = await api('/api/cluster/training/' + id + '/weight', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: path.trim() })
            });
            if (d.success) { showMsg('ok', currentPath ? '权重已修改' : '权重已记录'); loadTraining(); loadWeights(); }
            else showMsg('err', d.error);
        }

        async function loadTest() {
            const d = await api('/api/cluster/test/list');
            const tbody = document.getElementById('test-list');
            if (!d.success) { tbody.innerHTML = '<tr><td colspan="8">加载失败</td></tr>'; return; }
            const statusClass = { pending: 'badge-pending', running: 'badge-running', done: 'badge-done', failed: 'badge-failed', killed: 'badge-killed' };
            const tasks = d.tasks || [];
            const shown = sectionCollapsed.test ? tasks.slice(0, 10) : tasks;
            let rows = shown.map(t => `
                <tr>
                    <td>${t.id}</td>
                    <td>${t.name}</td>
                    <td>${t.task_type}</td>
                    <td>${t.deploy_task_id || '-'}</td>
                    <td>${t.server_name || '-'}</td>
                    <td>${t.port || '-'}</td>
                    <td><span class="badge ${statusClass[t.status] || 'badge-pending'}">${t.status}</span></td>
                    <td>
                        ${t.log_path ? `<button class="btn btn-secondary" style="padding:4px 8px;font-size:0.8rem;margin-right:4px;" onclick="viewTestLog(${t.id})">日志</button>` : ''}
                        ${t.status === 'running' ? `<button class="btn btn-danger" style="padding:4px 8px;font-size:0.8rem;" onclick="killTest(${t.id})">停止</button>` : ''}
                        ${t.status !== 'running' ? `<button class="btn btn-secondary" style="padding:4px 8px;font-size:0.8rem;" onclick="deleteTest(${t.id})">删除</button>` : ''}
                    </td>
                </tr>
            `).join('');
            if (!rows) {
                rows = '<tr><td colspan="8">暂无测试任务</td></tr>';
            } else if (sectionCollapsed.test && tasks.length > 10) {
                rows += `<tr><td colspan="8" style="text-align:center;color:#8b949e;font-size:0.8rem;">共 ${tasks.length} 条，仅显示前 10 条，点击“折叠/展开”查看全部</td></tr>`;
            }
            tbody.innerHTML = rows;
        }

        async function submitTest() {
            const name = document.getElementById('test-name').value.trim();
            const type = document.getElementById('test-type').value;
            const serverName = document.getElementById('test-server').value.trim();
            const deployId = document.getElementById('test-deploy-id').value.trim();
            const testCodePath = document.getElementById('test-code-path').value.trim();
            const script = document.getElementById('test-script').value.trim();
            const args = document.getElementById('test-args').value.trim();
            const mockUrl = document.getElementById('test-mock-url').value.trim();
            const mockTaskName = document.getElementById('test-mock-task-name').value.trim();
            const userToken = document.getElementById('test-user-token').value.trim();
            const runId = document.getElementById('test-run-id').value.trim();
            if (!name) { showMsg('err', '任务名必填'); return; }
            if (!serverName) { showMsg('err', '测试服务器必选'); return; }
            if (!script) { showMsg('err', '脚本路径必填'); return; }
            if (!testCodePath) { showMsg('err', '测试代码路径必填'); return; }
            if (!mockUrl || !mockTaskName) { showMsg('err', 'URL 和 task_name 必填'); return; }
            if (type === 'real' && (!userToken || !runId)) { showMsg('err', 'real 模式需填写 user_token 和 run_id'); return; }
            const payload = {
                name,
                task_type: type,
                server_name: serverName,
                deploy_task_id: deployId || null,
                test_code_path: testCodePath,
                script_path: script,
                script_args: args,
                mock_url: mockUrl,
                mock_task_name: mockTaskName,
                user_token: userToken,
                run_id: runId
            };
            // 本地记录上一次测试参数
            saveLastTestForm(payload);
            const d = await api('/api/cluster/test/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (d.success) { showMsg('ok', '测试任务已提交'); loadTest(); }
            else showMsg('err', d.error);
        }

        async function killTest(id) {
            if (!confirm('确定停止该测试任务？')) return;
            const d = await api('/api/cluster/test/' + id + '/kill', { method: 'POST' });
            if (d.success) { showMsg('ok', '已停止'); loadTest(); }
            else showMsg('err', d.error);
        }

        async function deleteTest(id) {
            if (!confirm('确定删除该测试任务？此操作不可恢复')) return;
            const d = await api('/api/cluster/test/' + id + '/delete', { method: 'POST' });
            if (d.success) { showMsg('ok', '已删除'); loadTest(); }
            else showMsg('err', d.error);
        }

        async function loadWeights() {
            const d = await api('/api/cluster/weights');
            const tbody = document.getElementById('weight-list');
            if (!d.success) { tbody.innerHTML = '<tr><td colspan="4">加载失败</td></tr>'; return; }
            tbody.innerHTML = d.weights.map(w => `
                <tr><td>${w.name}</td><td><code>${w.path}</code></td><td>${w.server_name}</td><td>${w.training_task_id || '-'}</td></tr>
            `).join('') || '<tr><td colspan="4">暂无权重记录</td></tr>';
        }

        async function transferWeight() {
            const src = document.getElementById('xfer-src').value.trim();
            const dst = document.getElementById('xfer-dst').value.trim();
            const path = document.getElementById('xfer-path').value.trim();
            if (!src || !dst || !path) { showMsg('err', '请填写源服务器、目标服务器和路径'); return; }
            const d = await api('/api/cluster/weights/transfer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ src_server: src, dst_server: dst, path })
            });
            if (d.success) showMsg('ok', '传输任务已提交');
            else showMsg('err', d.error);
        }

        async function loadAlerts() {
            const d = await api('/api/cluster/alerts');
            const el = document.getElementById('alert-list');
            if (!d.success) { el.innerHTML = '加载失败'; return; }
            const alerts = d.alerts || [];
            const shown = sectionCollapsed.alert ? alerts.slice(0, 10) : alerts;
            if (!shown.length) {
                el.innerHTML = '<p style="color:#8b949e;">暂无报警</p>';
                return;
            }
            let html = shown.map(a =>
                `<div style="padding:8px;background:#21262d;border-radius:6px;margin-bottom:8px;">${a.server_name} - ${a.alert_type}: ${a.message}</div>`
            ).join('');
            if (sectionCollapsed.alert && alerts.length > 10) {
                html += `<p style="color:#8b949e;font-size:0.8rem;text-align:center;margin-top:4px;">共 ${alerts.length} 条，仅显示前 10 条，点击“折叠/展开”查看全部</p>`;
            }
            el.innerHTML = html;
        }

        function refresh() {
            loadConfig();
            loadIdleGpus();
            loadTraining();
            loadDeploy();
            loadTest();
            loadWeights();
            loadAlerts();
        }

        document.addEventListener('DOMContentLoaded', function() {
            refresh();
            onTestTypeChange();
            setInterval(refresh, 15000);
        });
    </script>
</body>
</html>
